#
# Continuous-delivery workflow for the Flet-based DSTU Secure Channel
# messenger. On every push to ``main`` (and on manual dispatch) the
# workflow builds platform-native bundles for Windows, macOS, Linux and
# Android in parallel and uploads each result as a downloadable
# artifact. The desktop targets use the host operating system's runner
# directly; the Android target additionally provisions JDK 17 (Temurin)
# via ``actions/setup-java`` because the Flet APK toolchain shells out
# to Gradle.

name: Build Flet Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: "utf-8"

jobs:
  build-windows:
    name: Build Windows desktop bundle
    runs-on: windows-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows app
        shell: bash
        run: yes | flet build windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSTU-Messenger-Windows
          path: build/windows/
          if-no-files-found: error

  build-macos:
    name: Build macOS desktop bundle
    runs-on: macos-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: yes | flet build macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSTU-Messenger-macOS
          path: build/macos/
          if-no-files-found: error

  build-linux:
    name: Build Linux desktop bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux app
        run: yes | flet build linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSTU-Messenger-Linux
          path: build/linux/
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Android APK
        run: yes | flet build apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSTU-Messenger-Android
          path: build/apk/
          if-no-files-found: error